<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        //1. fetch(url) 호출
        //2. response.json() 호출

        const API_URL = 'https://jsonplaceholder.typicode.com/users';
        
        //1. then() 체이닝 방식
        //콜백 함수를 체이닝으로 연결함. 단계가 많아질수록 콜백 지옥의 개선 버전이긴 하지만
        //별도 메서드를 끝에 호출 필요 
        //여러 프로그램을 병렬로 호출 할 때 사용됨. 읽을 줄 알아야함.
        function fetchDataWithThen(){
            fetch(API_URL)
            //1. 서버의 응답(Response) 객체가 도착하면 실행
            .then(response =>{
                console.log(response);
                if (!response.ok){
                    //실패 시 에러 반환. fetch API 필수. 자동 reject 안됨.
                    //response.ok는 상태 코드가 200번대(정상)일 때만 true
                    //fetch가 서버와 연결이 실패했을때, reject 상태 반환하고, catch로 직행한다.
                    //그러나 서버와 연결은 성공 했지만, 400, 500 같은 응답은 fetch가 스스로 인식하지 못하기 때문에
                    //throw를 통해 수동으로 에러를 던져주면, catch가 비로소 잡을 수 있다.
                    throw new Error(`HTTP error ${response.status}`)
                }
                return response.json(); //return 필수
            })
            //2. .json() Promise가 성공적으로 완료되면, 파싱된 데이터를 받아서 실행
            .then(data => {
                console.log(data);
            })
            //서버 응답 실패 시 에러 catch
            .catch(error => {
                console.log('데이터를 가져오는데 실패했습니다.:', error);
            })
        }
        //fetchDataWithThen();  async/await와 헷갈리지 않기 위해 주석처리

        //방법 2. async/await 방식 사용
        //아래에서 순서대로 읽을 수 있음. 흐름이 직관적.
        //then() 체이닝 방식과 동일한 결과값 호출 됨.
        async function fetchDataWithThen() {
            //async await 블럭은 try-catch 블럭 사용
            try{
                const response = await fetch(API_URL);
                console.log(response);

                if(!response.ok){
                    throw new Error(`HTTP error: ${response.status}`);
                }
                const data = await response.json();
                console.log(data);
            } 
            catch(error){
                console.log(error);
            }
            
        }
        fetchDataWithThen();

    </script>
</body>
</html>
