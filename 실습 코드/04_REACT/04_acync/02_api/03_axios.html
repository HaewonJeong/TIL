<!-- 
axios: fetch의 불편함을 개선한 라이브러리
1) 기본 성격
-fetch: 브라우저에 원래 내장된 기본 기능(API)
-axios: 외부 라이브러리(설치/CDN 필요) 
2) JSON 처리 차이
-fetch: 응답을 JSON으로 쓰려면 직접 변환
외부 라이브러리(설치/CDN 필요) 
-axios: 자동으로 JSON 파싱
3) 에러 처리 방식 차이 (중요)
-fetch: HTTP 에러(404, 500)가 나도 catch로 안 감
즉, fetch는 실패로 취급하지 않고 response를 줍니다.
그래서 직접 검사해야 합니다.
-axios: 404, 500 같은 HTTP 에러면 자동으로 catch로 감
-->

<!-- ================================================
 🌐 프론트엔드 API 통신 3대장 핵심 요약
================================================

1️⃣ fetch + then() 체이닝
  - 도구: 브라우저 기본 내장 (설치 X)
  - 특징: 코드가 옆으로 길어짐. 옛날 방식이라 요즘은 잘 안 씀.
  - 단점: 404, 500 에러를 자동으로 못 잡음.
          -> if(!response.ok) throw Error 수동 예외처리 필수!
  - 단점: 데이터 파싱할 때 response.json() 필수!

2️⃣ fetch + async/await
  - 도구: 브라우저 기본 내장 (설치 X)
  - 특징: 코드가 위에서 아래로 읽혀 가독성 좋음. 가벼운 프로젝트에 추천.
  - 단점: 1번과 마찬가지로 수동 예외처리와 response.json()은 여전히 해줘야 함.

3️⃣ Axios (+ async/await)
  - 도구: 외부 라이브러리 (npm install axios)
  - 특징: 실무 최강자, 프론트엔드 개발 표준.
  - 장점 1: 404, 500 에러 나면 알아서 catch 블록으로 던져줌 (수동 예외처리 X).
  - 장점 2: JSON 변환도 알아서 해줘서 response.json() 안 써도 됨.
  - npm install axios 처럼 외부에서 다운로드해서 써야 하는 라이브러리
   -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script> 
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script crossorigin src="https://unpkg.com/axios/dist/axios.min.js"></script>

</head>
<body>
    <script>

        const API_URL = 'https://jsonplaceholder.typicode.com/users/1';

        //fetch 사용
        async function callApiWithFetch(){

            try{
                const response = await fetch(API_URL); 
                //*fetch 사용 시 if(response.ok) 필수. 여기선 예제라서 생략. 
                const data = await response.json(); //json()으로 직접 파싱
                console.log(data);
            }catch(error){
                console.error(error);
            }
        }
        //axios 사용
        async function callApiWithAxios(){
            try{
                const response = await axios.get(API_URL); // .get(), .post()등 직관적 메소드 사용
                const data = response.data;  //자동으로 JSON 파싱
                console.log('axios data: ', data);
                console.log('axios response', response); 
            }
            catch(error){
                console.error(error);
            }
        }
        callApiWithAxios();
        callApiWithAxios();

    </script>
</body>
</html>
