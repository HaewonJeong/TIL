<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script> 
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>
<body>
    <div id="root"></div>

    <script type="text/babel">

        console.log(React);

        const {useState} = React;

        function MessageManager(){
            //useState 함수를 호출 한다. 
            //[상태 값, 상태 변경 함수 반환] = useState(초기값);
            //['초기 상태 메세지 입니다.', 상태 변경 함수]
            //배열 구조분해 할당
            //useState()가 배열을 리턴하는데 그 배열의 첫 번째 값은 message에,두 번째 값은 setMessage에 넣는다.
            //상태값이 변경될 때 마다 rerendering 되고 있다.
            const [message, setMessage] = useState('초기 상태 메세지 입니다.');
            const [textColor, setTextColor] = useState('black');

            console.log('MessageManager 컴포넌트가 렌더링 되었습니다.');

            const handleEnter = () => {
                setMessage('안녕하세요! 환영합니다.');
                setTextColor('blue');
            }
            const handleLeave = () =>{
                setMessage('안녕히 가세요! 다음에 또 만나요.');
                setTextColor('red');
            }

            return(
                <div>
                    <h1>useState</h1>
                    {/*스타일 전달할때는 중괄호가 하나 더 들어간다.*/}
                    <h2 style={{color: textColor}} >{message}</h2> 

                    <button onClick={handleEnter}>입장</button>
                    <button onClick={handleLeave}>퇴장</button>
                </div>
            )
        }

        function Counter(){
            const [number, setNumber] = useState(0); //상태 변경 함수

            const increaseByTwo = () => {
                setNumber((preveNumber) => preveNumber +1 );
                setNumber((preveNumber) => preveNumber +1 ); //1+1 가 되서 +2 넣어줘.
            };
            return(
                <div>
                    <h1>카운터</h1>
                    <h2>현재 숫자: {number}</h2>
                    <button onClick={()=> setNumber(number + 1)}>+1</button>
                    <button onClick={()=> {
                        setNumber(number + 1);
                        setNumber(number + 1); //React가 최종적으로 한번만 호출. React는 상태 업데이트를 "즉시" 반영하지 않기 떄문.
                    //}}>+1</button>
                    }}>+2(동작 안함)</button>
                    <button onClick={()=> setNumber(number - 1)}>-1</button>
                    <button onClick={increaseByTwo}>+2</button>
                </div>
            )
        }

        function App(){
            return(
            <>
                <MessageManager />
                <hr />
                <Counter />
            </>
            )   
        }
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);


    </script>
</body>
</html>
