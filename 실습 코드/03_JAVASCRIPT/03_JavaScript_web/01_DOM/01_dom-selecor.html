<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM 요소 선택</title>
</head>
<body>
    <h1>DOM 요소 선택</h1>
    <hr>
    <h3>`querySelctor`와 `querySelectorAll`</h3>
    <pre>
        CSS 선택자를 그대로 사용하여 요소를 찾는, 가장 강력하고 일관성 있는 방법입니다.
        이 두 가지만 마스터하면 사실상 모든 요소를 선택할 수 있습니다.
    </pre>

    <ul>
        <li id="apple" class="fruit red">사과</li>
        <li class="fruit">바나나</li>
        <li>딸기</li>
    </ul>

    <script>
        //요즘 Javascript에서 가장 많이 요소를 찾을 때 쓰는 표준 요소 querySelector, querySelectorAll 입니다.
        //querySelector: CSS 선택자에 맞는 '첫 번째 요소 하나'만 찾아온다.
        const $apple = document.querySelector('#apple');
        $apple.style.fontWeight = 'bold';

        const $fristFruit = document.querySelector('.fruit');
        console.log($fristFruit);

        //querySelectorAll : CSS 선택자에 맞는 '모든 요소'를 NodeList로 찾아온다.
        const $fruit = document.querySelectorAll(`.fruit`);
        console.log($fruit);

        $fruit.forEach(item => {
            item.style.border = '1px solid blue';
        });
    </script>
</body>
</html>
