<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script> 
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>
<body>
    <div id="root"></div>

    <script type="text/babel"> 

        const {useState, useEffect} = React;

        //custom hook 예시)useinput, 현재 브라우저 크기 계산 로직, 팝업창 띄우고 닫는 상태 관리
        //만들 때 use를 붙여서 만들어야 함
        
        //커스텀 훅 정의 : 
        //이름이 'use'로 시작하는 일반 자바스크립트 함수
        function useDelayTimer(delay){
            //시간이 지났는지 여부를 저장하는 상태
            const [isReady, setIsReady] = useState(false);

            useEffect(()=>
                {
                    console.log(`${delay}ms 타이머 시작`);

                    const timer = setTimeout( ()=> {
                        setIsReady(true);
                        console.log('타이머 종료! 준비완료');
                    },delay );

                    //언마운트 될 때 타이머 정리(메모리 누수 방지)
                    return () => clearTimeout(timer);
                },[delay]);

            return isReady;

        }

        function App(){
            
            const isReady = useDelayTimer(3000);

            return(
                <>
                    <h1>Custom Hook</h1>
                    <hr/>
                    {isReady ? 
                        <h2 style={{color:'blue'}}>준비 완료!! 안녕하세요~</h2>
                        : <h2 style={{color:'red'}}>잠시만 기다려주세요...</h2>
                    }                    
                </>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    </script>
</body>
</html>
