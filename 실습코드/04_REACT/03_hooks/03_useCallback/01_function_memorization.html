<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script> 
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>
<body>
    <div id="root"></div>

    <script type="text/babel">

        const { useState, useEffect, useCallback} = React;

        function App () {
            const [number, setNumber] = useState(0);
            const [toggle, setToggle] = useState(false);

            // 기존 함수 : 토글 버튼을 눌러도 'printNumber 함수가 변경되었습니다.' 가 불필요하게 출력 됨
            //App() 함수를 다시 호출해서 ➡️ return 부분(JSX)을 다시 계산해. 즉, 리렌더링 = App 함수 재실행
            //number가 바뀌면 App 컴포넌트 함수(App()) 자체가 다시 실행
            //그래서 "값을 기억 시" : useMemo
            //"함수 기억 시" : useEffect

            // React는 컴포넌트가 리렌더링될 때마다 내부의 함수/객체를 새로 만든다.
            // 그래서 함수/객체를 props나 useEffect 의존성에 넣으면 "변경됨"으로 인식된다.
            // useCallback은 함수를 기억해서(같은 참조값 유지) 불필요한 useEffect/리렌더링을 막는다.
            // useMemo는 값(객체/배열/계산결과)을 기억해서(같은 참조값 유지) 불필요한 재생성을 막는다.
            // 즉 "고정"이란 리렌더링돼도 같은 함수/객체를 재사용하도록 참조값을 유지하는 것이다.
            //고정 = 주소(참조값)를 안 바뀌게 유지해서 React가 "변경 없음"으로 인식하게 만드는 것

             const printNumber = () => {
                 console.log('current number', number);
             };

            // //개선 함수
            // const printNumber = useCallback(() => {
            //     console.log('current number', number);
            // },[number]); //number 값이 바뀔 때 만 이 함수를 새로 만들어라/
            //함수안에서 사용하는 state나 props가 있다면, 반드시 의존성 배열에 넣어줘야 한다.
            //useCall : 함수를 기억함. 

            //App이 리렌더링 되면 printNumber가 새로 만들어지고, React는 "printNumber가 바뀌었네?"라고 판단
            //->useEffect 실행 -> 콘솔 출력
            useEffect( ()=> {
                console.log('printNumber 함수가 변경되었습니다.');
            }, [printNumber])

        return(
            <>
                <input
                    type="number"
                    value={number}
                    onChange={e=> setNumber(parseInt(e.target.value))}
                />
                <button onClick={printNumber}>숫자 출력</button>
                <hr/>
                <button onClick={()=>setToggle(!toggle)}>토글 버튼</button>
                <p>토글 상태: {String(toggle)}</p> {/*불린 값은 문자열로 바꿔야 JSX 문법으로 화면에 표현된다.*/}
            </>
        )

        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    </script>
</body>
</html>
