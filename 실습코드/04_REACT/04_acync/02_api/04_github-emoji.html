<!--깃허브 이모지 DOCS : https://docs.github.com/ko/rest/emojis/emojis?apiVersion=2026-03-10 -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script> 
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script crossorigin src="https://unpkg.com/axios/dist/axios.min.js"></script>

</head>
<body>
    <div id="root"></div>

    <script type="text/babel"> 
       
       const { useState, useEffect } = React;

       //요청 URL : https://api.github.com/emojis
       //주소 클릭하면 사이트 들어가짐. key:이모지 주소

       //사용자의 입력을 받고, '검색' 이벤트가 발생했음을 부모에게 알린다.
       //dump component. 발생한 클릭 이벤트 부모에게 알리는 역할
       function SearchBox({onSearch}){

            const [inputText, setInputText] = useState('');

            const handleSearchClick = () => {
                //전달 받은 onSearch 함수 사용
                onSearch(inputText);
            };

            return(
                <>
                    <input 
                        type="text"
                        placeholder='이모지 이름을 입력하세요'
                        value={inputText}
                        onChange={e => setInputText(e.target.value)}
                        //onKeyDown={}
                    />
                    <button onClick={handleSearchClick}>검색</button>
                </>

            )
        }

        //컴포넌트기 때문에 앞글자 대문자!
        //부모가 주는 상태에 따라 화면을 다르게 보여준다.
        function ImageBox( {imgUrl, loading} ){
            if(loading){
                return <p>로딩중...</p>
            }
            if(imgUrl){
                return <img src={imgUrl} alt="emoji" width="150" height="150"/>
            }
            return <p>이모지를 검색해주세요</p>;
        }

        //모든 데이터와 상태 관리(로딩, 전체 이모지 목록, 검색 결과 URL)를 관리
        //API 통신을 책임지고, 자식들의 행동에 따라 상태를 업데이트 한다.
        //App<-- smart 컴포넌트
        //SearchBox: 입력받은 값을 부모에게 전달
        //ImageBox: 이미지 출력
        //구조 잡고 만들기.
        function App(){

            const [loading, setLoading] = useState(true); //로딩 상태. 데이터 받아오면 false 변경
            const [emojis, setEmojis] = useState(null); //전체 이모지 목록. 전체 이미지 저장 공간
            const [imageUrl, setImageUrl] = useState(null); //검색 결과 이미지 URL

            //마운트 시 1번만 실행. useEffect+[] 빈 의존성 배열. 
            //딱 한번만 이모지 API를 가져온다.
            useEffect( () => {
                const API_URL = 'https://api.github.com/emojis';

                async function fetchEmojis() {
                    try{
                        const response = await axios.get('https://api.github.com/emojis');
                        setEmojis(response.data); //가져온 데이터를 저장
                        
                    }catch(error){
                        console.error(error);
                    }finally{ //비동기 함수를 호출하고, 성공/실패 관계없이 상태를 false로 변경
                        setLoading(false); //로딩 완료
                    }                    
                }
                fetchEmojis();

            },[]);

            // 검색된 이모지 이름을 이용하여 일치하는 이미지를 찾아, imgUrl 설정
            const handleSearch = (emojiName) => {
                //실무에서 버그를 줄일 수 있는 방어 코드!
                if(!emojis || emojiName.trim() === ''){
                    setImageUrl(null); //제대로된 이미지 url이 없을때는 null 리턴
                    return;
                }
                //emojis 객체에서 emojiName을 키로 가진 값을 찾음
                const foundUrl = emojis[emojiName]; //대괄호 표기법
                setImageUrl(foundUrl || null); //찾았으면 url을, 못 찾았으면 undefined가 반환 되고, 이를 null 설정

            }

            return (
                <>
                    <h1>이모지 검색기</h1>
                    <SearchBox onSearch={handleSearch}/> 
                    <br/>
                    <ImageBox imgUrl={imageUrl} loading={loading}/>
                </>
            );
        }
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    </script>
</body>
</html>
