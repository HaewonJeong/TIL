<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script> 
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>
<body>
    <div id="root"></div>

    <script type="text/babel"> 

        /*HTML 일때는 페이지 전체를 새로 고침 필요
        Ajax 가 나오면서 필요한 부분만 새로고침 하는 개념 나옴
        fetch API는 자바스크립트 내장 기능
        */

        //fetch 기본문법
        //옵션 생략 시 get 메서드로 보내짐. 종류 : get,post,put,delete
        //fecth를 호출하면 promise 객체(약속 증서.나중에 줄게~객체)를 반환함
        //https://jsonplaceholder.typicode.com/
        //https://jsonplaceholder.typicode.com/users 주소로 요청하면, 데이터를 반환해주는 서버가 있다.
        //비동기 호출 시도
       //let promise = fetch(url, [option])
        
        
            // function callAPI(){
            //      const promise1 = fetch('https://jsonplaceholder.typicode.com/users')//option 생략 시 get
            //      console.log(promise1);//promise 객체만 반환됨. 활용 안됨
            // }

        //올바른 요청 방법
       async function callAPI(){
            
            //promise 객체만 반환됨. 활용 안됨. 순간에 오는 건 데이터가 아니라 Promise(미래의 응답)
            //응답 유형 : ok : 에러처리 할 때, headers : 서버가 보내준 응답 헤더 정보
            const promise = fetch('https://jsonplaceholder.typicode.com/users')//option 생략 시 get
            console.log('promise',promise);
            console.log("promise['[[PromiseResult]]",promise['[[PromiseResult]]']);

            //Promise 결과는 await로 받아야 함
            const response = await fetch('https://jsonplaceholder.typicode.com/users')
            console.log('response',response);

            //bodyUsed : reponse는 한 번만 body를 꺼내 사용 할 수 있다. 
            console.log(`본문 사용 여부: ${response.bodyUsed}`);

            //json : 응답을 주고 받을 때 사용하는 표준 형식. 
            //숫자, 문자열, 배열 등 다양한 형식을 담는다.
            //본문 내용을 json으로 파싱(해석해서 구조화)해서 자바스크립트 객체 형식으로 변환
           
           //response 안의 JSON 데이터도 다시 Promise. 비동기 임으로 await 필수
            const responseJson = await response.json(); //response 안의 JSON 데이터도 다시 Promise. 비동기 임으로 await 필수.
            console.log('responseJson',responseJson);
            
             //reponse를 두번 꺼내 사용 시 에러 반환
            //Failed to execute 'json' on 'Response': body stream already read
            console.log(`본문 사용 여부: ${response.bodyUsed}`);
            const responseJson1 = await response.json(); 
            
       }
       
       callAPI();
       

    </script>
</body>
</html>
