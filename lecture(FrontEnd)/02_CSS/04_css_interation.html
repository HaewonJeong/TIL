<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interation</title>
    <style>
        .button{
            display: inline-block;
            padding: 15px 30px;
            background-color: aqua;
            margin: 20px;
            color: black;
            text-decoration: none; /*글자 밑줄 없앰*/
            border-radius: 10px; /*모서리 둥글게*/

            transition: all 0.3s ease; /*마우스를 올렸을때 부드럽게 변하게*/
        }
        /*1. Hover: 마우스 커서를 올렸을 때의 상태를 선택*/
        .button:hover {
            background-color: rgb(47,102,102);
            color: white;
            transform: translateY(-5px);   /*transform: 요소의 모양 변형*/
            box-shadow: 0 5px 10px rgb(0, 0, 0, 0.3); /*그림자*/
        }
        /*2. Active: 요소를 클릭하고 있는 동안의 상태 선택*/
        .button:active{
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <h1>마우스 반응과 부드러운 효과</h1>
    <p>가상 클래스 선택자(:hover)와 트랜지션(transition)을 이용해 인터랙션 할 수 있다.</p>

    <a href="#" class="button">마우스를 올려보세요!</a>
    
</body>
</html>
